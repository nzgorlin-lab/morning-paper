name: Morning Paper

on:
  schedule:
    # 04:00 UTC = 07:00 Israel summer (UTC+3) / 06:00 Israel winter (UTC+2)
    - cron: '0 4 * * *'
  workflow_dispatch:   # lets you trigger manually from GitHub Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate paper
        run: node generate.js
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY:  ${{ secrets.TAVILY_API_KEY }}
          API_BASE:        ${{ secrets.PAPER_URL }}

      - name: Commit & push HTML
        run: |
          git config user.name  "Morning Paper Bot"
          git config user.email "bot@morning-paper.local"
          git add -f morning-paper.html
          git diff --staged --quiet || git commit -m "Morning Paper $(date +%Y-%m-%d)"
          git push

      - name: Send WhatsApp notification
        run: node notify.js
        env:
          CALLMEBOT_PHONE:  ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          PAPER_URL:        ${{ secrets.PAPER_URL }}
